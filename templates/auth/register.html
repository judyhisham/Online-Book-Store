<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register - Online Bookstore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header th:replace="~{fragments/layout :: navbar}"></header>

<main>
    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Create Account</h2>
            <p class="subtitle">Join us and start your reading journey today.</p>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/register}" method="post">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input id="name" name="name" type="text"
                           th:value="${name}" class="form-control"
                           placeholder="Your full name"/>
                </div>

                <div class="form-group">
                    <label for="username">Username <span class="required">*</span></label>
                    <input id="username" name="username" type="text" required
                           th:value="${username}" class="form-control"
                           placeholder="3-20 characters, letters/numbers/underscore"/>
                </div>

                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input id="email" name="email" type="email" required
                           th:value="${email}" class="form-control"
                           placeholder="you@example.com"/>
                </div>

                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input id="password" name="password" type="password" required
                           class="form-control" placeholder="At least 6 characters"/>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                    <input id="confirmPassword" name="confirmPassword" type="password" required
                           class="form-control" placeholder="Re-enter your password"/>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account?
                <a th:href="@{/login}">Sign in</a>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
