<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Payment - Online Bookstore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header th:replace="~{fragments/layout :: navbar}"></header>

<main>
    <div class="container">

        <div th:replace="~{fragments/layout :: flash}"></div>

        <div class="page-header">
            <h1>Payment</h1>
            <p>Order #<span th:text="${order.id}">0</span> - Step 3 of 3</p>
        </div>

        <div style="max-width: 560px; margin: 0 auto;">

            <div class="card mb-2">
                <div class="flex-between">
                    <span class="text-muted">Order Total</span>
                    <span style="font-size: 24px; font-weight: 700; color: #1e3a8a;"
                          th:text="'$' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}">$0.00</span>
                </div>
            </div>

            <div class="card mb-2">
                <h3 class="card-title">Card Details</h3>

                <div class="form-group">
                    <label for="cardNumber">Card Number</label>
                    <input id="cardNumber" type="text" class="form-control"
                           placeholder="4242 4242 4242 4242" maxlength="19"
                           oninput="formatCard(this)"/>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="expiry">Expiry</label>
                        <input id="expiry" type="text" class="form-control" placeholder="MM/YY" maxlength="5"/>
                    </div>
                    <div class="form-group">
                        <label for="cvv">CVV</label>
                        <input id="cvv" type="text" class="form-control" placeholder="123" maxlength="4"/>
                    </div>
                </div>

                <div class="form-group">
                    <label for="holder">Cardholder Name</label>
                    <input id="holder" type="text" class="form-control"
                           th:value="${session.user.name}" placeholder="Name on card"/>
                </div>

                <div class="alert alert-info">
                    Note: This is a demo. No real payment is processed - any card details will be accepted.
                </div>
            </div>

            <form th:action="@{/payment}" method="post">
                <input type="hidden" name="orderId" th:value="${order.id}"/>
                <button type="submit" class="btn btn-success btn-block"
                        style="font-size: 16px; padding: 14px;">
                    Pay <span th:text="'$' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}">$0.00</span>
                </button>
            </form>

        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
