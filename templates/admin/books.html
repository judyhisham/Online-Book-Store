<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Books - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header th:replace="~{fragments/layout :: adminNavbar('books')}"></header>
<main>
    <div class="container">
        <div th:replace="~{fragments/layout :: flash}"></div>
        <div class="page-header flex-between">
            <div>
                <h1>Manage Books</h1>
                <p>Add, edit, or delete books from the catalog.</p>
            </div>
            <a th:href="@{/admin/books/add}" class="btn btn-primary">+ Add Book</a>
        </div>

        <div th:if="${books.isEmpty()}" class="empty-state">
            <h2>No books yet</h2>
            <a th:href="@{/admin/books/add}" class="btn btn-primary">Add the first book</a>
        </div>

        <table th:if="${!books.isEmpty()}" class="table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="book : ${books}">
                    <td>
                        <strong th:text="${book.title}">Title</strong>
                        <br/>
                        <small class="text-muted" th:text="${book.author}">Author</small>
                    </td>
                    <td th:text="${book.category}">-</td>
                    <td th:text="'$' + ${#numbers.formatDecimal(book.price, 1, 2)}">$0.00</td>
                    <td>
                        <span th:text="${book.quantity}">0</span>
                        <span th:if="${book.quantity == 0}" class="badge badge-cancelled">Out</span>
                        <span th:if="${book.quantity > 0 and book.quantity <= 5}" class="badge badge-pending">Low</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/books/edit/{id}(id=${book.id})}" class="btn btn-secondary btn-sm">Edit</a>
                        <form th:action="@{/admin/books/delete/{id}(id=${book.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm"
                                    data-confirm="Are you sure you want to delete this book?">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
