<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shopping Cart - Online Bookstore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header th:replace="~{fragments/layout :: navbar}"></header>

<main>
    <div class="container">

        <div th:replace="~{fragments/layout :: flash}"></div>

        <div class="page-header">
            <h1>Shopping Cart</h1>
            <p><span th:text="${cartItems.size()}">0</span> item(s) in your cart</p>
        </div>

        <!-- Empty cart -->
        <div th:if="${cartItems.isEmpty()}" class="empty-state">
            <div class="icon">&#128722;</div>
            <h2>Your cart is empty</h2>
            <p>Looks like you haven't added any books yet.</p>
            <a th:href="@{/catalog}" class="btn btn-primary">Browse Catalog</a>
        </div>

        <!-- Cart with items -->
        <div th:if="${!cartItems.isEmpty()}" class="two-col">
            <!-- Items -->
            <div>
                <div th:each="item : ${cartItems}" class="cart-item">
                    <div class="thumb">
                        <img th:if="${item.book.imageUrl != null and !#strings.isEmpty(item.book.imageUrl)}"
                             th:src="${item.book.imageUrl}" th:alt="${item.book.title}"/>
                        <span th:if="${item.book.imageUrl == null or #strings.isEmpty(item.book.imageUrl)}">B</span>
                    </div>

                    <div>
                        <h4 th:text="${item.book.title}">Title</h4>
                        <div class="meta" th:if="${item.book.author}" th:text="'by ' + ${item.book.author}">Author</div>
                        <div class="meta" th:text="'$' + ${#numbers.formatDecimal(item.book.price, 1, 2)} + ' each'">$0.00</div>

                        <div class="qty-control mt-1">
                            <form th:action="@{/cart/update}" method="post">
                                <input type="hidden" name="cartItemId" th:value="${item.id}"/>
                                <button type="submit" name="quantity" th:value="${item.quantity - 1}">-</button>
                            </form>
                            <span class="qty-value" th:text="${item.quantity}">1</span>
                            <form th:action="@{/cart/update}" method="post">
                                <input type="hidden" name="cartItemId" th:value="${item.id}"/>
                                <button type="submit" name="quantity" th:value="${item.quantity + 1}">+</button>
                            </form>
                        </div>
                    </div>

                    <div class="text-right">
                        <div style="font-size:18px;font-weight:700;color:#1e3a8a;"
                             th:text="'$' + ${#numbers.formatDecimal(item.book.price.doubleValue() * item.quantity, 1, 2)}">$0.00</div>
                        <form th:action="@{/cart/remove}" method="post" class="mt-1">
                            <input type="hidden" name="cartItemId" th:value="${item.id}"/>
                            <button type="submit" class="btn btn-danger btn-sm"
                                    data-confirm="Remove this item from your cart?">Remove</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Summary -->
            <div>
                <div class="card summary-card">
                    <h3 class="card-title">Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(subtotal, 1, 2)}">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (8%)</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(tax, 1, 2)}">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span style="color:#16a34a;">FREE</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}">$0.00</span>
                    </div>

                    <a th:href="@{/checkout}" class="btn btn-primary btn-block mt-2">Proceed to Checkout</a>
                    <a th:href="@{/catalog}" class="btn btn-secondary btn-block mt-1">Continue Shopping</a>
                </div>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
