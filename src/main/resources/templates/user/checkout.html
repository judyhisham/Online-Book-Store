<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Checkout - Online Bookstore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header th:replace="~{fragments/layout :: navbar}"></header>

<main>
    <div class="container">

        <div th:replace="~{fragments/layout :: flash}"></div>

        <div class="page-header">
            <h1>Checkout</h1>
            <p>Step 2 of 3 - Review your order</p>
        </div>

        <div class="two-col">
            <div>
                <div class="card mb-2">
                    <h3 class="card-title">Order Review</h3>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Book</th>
                                <th>Qty</th>
                                <th class="text-right">Price</th>
                                <th class="text-right">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${cartItems}">
                                <td th:text="${item.book.title}">Book</td>
                                <td th:text="${item.quantity}">1</td>
                                <td class="text-right" th:text="'$' + ${#numbers.formatDecimal(item.book.price, 1, 2)}">$0.00</td>
                                <td class="text-right" th:text="'$' + ${#numbers.formatDecimal(item.book.price.doubleValue() * item.quantity, 1, 2)}">$0.00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="card">
                    <h3 class="card-title">Delivery Information</h3>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control" th:value="${session.user.name}" readonly/>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" th:value="${session.user.email}" readonly/>
                    </div>
                    <div class="alert alert-info" style="margin-bottom:0;">
                        Note: This is a demo application. No real shipping is processed.
                    </div>
                </div>
            </div>

            <div>
                <div class="card summary-card">
                    <h3 class="card-title">Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(subtotal, 1, 2)}">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (8%)</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(tax, 1, 2)}">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span style="color:#16a34a;">FREE</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}">$0.00</span>
                    </div>

                    <form th:action="@{/checkout}" method="post">
                        <button type="submit" class="btn btn-primary btn-block mt-2">Proceed to Payment</button>
                    </form>
                    <a th:href="@{/cart}" class="btn btn-secondary btn-block mt-1">Back to Cart</a>
                </div>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
