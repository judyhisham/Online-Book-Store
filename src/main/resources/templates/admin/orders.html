<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Orders - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header th:replace="~{fragments/layout :: adminNavbar('orders')}"></header>
<main>
    <div class="container">
        <div th:replace="~{fragments/layout :: flash}"></div>
        <div class="page-header">
            <h1>All Orders</h1>
            <p>Manage and update order statuses.</p>
        </div>

        <div th:if="${orders.isEmpty()}" class="empty-state">
            <h2>No orders yet</h2>
        </div>

        <table th:if="${!orders.isEmpty()}" class="table">
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Update Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td><strong th:text="'#' + ${order.id}">#0</strong></td>
                    <td>
                        <div th:text="${order.user.name}">Name</div>
                        <small class="text-muted" th:text="${order.user.email}">email</small>
                    </td>
                    <td th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy')}">--</td>
                    <td th:text="'$' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}">$0.00</td>
                    <td>
                        <span class="badge"
                              th:classappend="${order.status.name() == 'PENDING' ? 'badge-pending' :
                                              (order.status.name() == 'CONFIRMED' ? 'badge-confirmed' :
                                              (order.status.name() == 'SHIPPED' ? 'badge-shipped' : 'badge-cancelled'))}"
                              th:text="${order.status}">PENDING</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post"
                              style="display:flex;gap:6px;align-items:center;">
                            <select name="status" class="form-control" style="width:auto;padding:5px 8px;font-size:13px;">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                        th:selected="${s == order.status}">STATUS</option>
                            </select>
                            <button type="submit" class="btn btn-primary btn-sm">Save</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
