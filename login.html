<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In - Online Bookstore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header th:replace="~{fragments/layout :: navbar}"></header>

<main>
    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Welcome Back</h2>
            <p class="subtitle">Please sign in to continue shopping.</p>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" required
                           th:value="${username}" class="form-control"
                           placeholder="Enter your username"/>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required
                           class="form-control" placeholder="Enter your password"/>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account?
                <a th:href="@{/register}">Create one</a>
            </div>
            <div class="auth-footer">
                Are you an admin?
                <a th:href="@{/admin/login}">Admin login</a>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
